name: Chronicle README

on:
  schedule:
    - cron: "5 6 * * *"   # daily 06:05 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update README from public Chronicle API
        run: python scripts/update_chronicle.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet README.md; then
            git config user.name "cosmergon-chronicle-bot"
            git config user.email "bot@cosmergon.com"
            git add README.md
            git commit -m "chore: daily chronicle update"
            git push
          else
            echo "no change"
          fi
